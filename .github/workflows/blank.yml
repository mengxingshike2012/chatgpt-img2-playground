name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"          # 推荐 LTS 版本
          cache: 'npm'                  # 如果没有 package.json 可以删掉

      - name: Install dependencies
        run: npm ci                     # 如果只有 server.js 没有依赖，可以删掉这一步

      - name: Run Deployment script
        run: node server.js
